name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 指定检出到默认分支，并且获取完整的提交历史
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      # 新增：自动生成 update.json
      - name: Generate update.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # 提取 versionCode（去掉 v 和前导0，如 v0.0.1 -> 1）
          VERSION_CODE=$(echo $VERSION | sed 's/v//' | awk -F. '{print $1*10000 + $2*100 + $3}')

          cat > update.json << EOF
          {
            "version": "$VERSION",
            "versionCode": $VERSION_CODE,
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/$VERSION/ipset-$VERSION.zip",
            "changelog": "https://github.com/${{ github.repository }}/releases/tag/$VERSION"
          }
          EOF

      # 将 update.json 提交回仓库
      - name: Commit update.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "ci: 更新 update.json 到 ${{ github.ref_name }}" || echo "No changes to commit"
          git push

      - name: Build Magisk module ZIP
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          zip -r0 ipset-${VERSION}.zip \
            module.prop \
            customize.sh \
            system/ \
            META-INF/ \
            update.json \
            -x "*.git*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ipset模块 ${{ github.ref_name }}
          body: |
            ## 更新内容

            - 自动构建发布
            - 版本号：${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ipset-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
