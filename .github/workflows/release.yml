name: Build and Release

# 触发条件：推送 tag（如 v0.0.1）时自动触发，也支持手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 打包为 ZIP（存储模式，不压缩）
      - name: Build Magisk module ZIP
        run: |
          # 获取 tag 名称作为版本号
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # 使用 zip 打包，-r 递归，-0 存储模式（不压缩），-x 排除不需要的文件
          zip -r0 ipset-${VERSION}.zip \
            module.prop \
            customize.sh \
            system/ \
            META-INF/ \
            -x "*.git*"

      # 3. 创建 Release 并上传 ZIP
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ipset模块 ${{ github.ref_name }}
          body: |
            ## 更新内容

            - 自动构建发布
            - 版本号：${{ github.ref_name }}

            ### 安装方法
            1. 下载 `ipset-${{ github.ref_name }}.zip`
            2. 在 KernelSU/Magisk 中本地安装该 ZIP 文件
            3. 重启设备生效
          draft: false
          prerelease: false
          files: ipset-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
